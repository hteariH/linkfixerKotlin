spring:
  application:
    name: grokbot
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chatbot}
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: ${AI_MODEL:openai/gpt-oss-120b}

logging:
  file:
    name: /data/logs/grokbot.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7
  level:
    root: INFO
    com.mamoru: DEBUG
    org.springframework: INFO

telegram:
  bot:
    name: ${BOT_NAME:hellomynameiskiokbot}
    token: ${BOT_TOKEN}
