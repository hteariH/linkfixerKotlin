spring:
  application:
    name: hydra-manager-bot
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/hydramanagerbot}
  mongodb:
    uri: ${MONGODB_URI:mongodb://mongodb:27017/hydramanagerbot}

logging:
  file:
    name: /data/logs/hydra-manager-bot.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7
      total-size-cap: 1GB
      clean-history-on-start: true
  level:
    root: INFO
    com.mamoru: DEBUG
    org.springframework: INFO

telegram:
  bot:
    name: HydraManager_Bot
    token: ${HYDRA_BOT_TOKEN}

# AI provider selection: "gemini" (default) or "groq"
ai:
  provider: ${AI_PROVIDER:gemini}

groq:
  api-key: ${GROQ_API_KEY:}
  base-url: https://api.groq.com/openai
github:
  pat: ${PAT:}
  owner: ${GITHUB_OWNER:}
  repo: ${GITHUB_REPO:}
  ref: ${GITHUB_REF:ManagerBot_oc}
