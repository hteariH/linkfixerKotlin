services:
  app:
    image: ${REGISTRY}/${IMAGE_REPO}:${IMAGE_TAG}
    build: .
    container_name: grokbot
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/chatbot}
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_NAME=${BOT_NAME:-hellomynameiskiokbot}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AI_MODEL=${AI_MODEL:-openai/gpt-oss-120b}
    volumes:
      - /data/grokbot/app:/data
    networks:
      - grokbot-net
    restart: always

  mongodb:
    image: mongo:7
    container_name: grokbot-mongodb
    ports:
      - "27018:27017"
    volumes:
      - /data/grokbot/mongo:/data/db
    networks:
      - grokbot-net
    restart: always

networks:
  grokbot-net:
    driver: bridge
