name: OpenCode Telegram Agent

on:
  repository_dispatch:
    types: [telegram_cmd]

jobs:
  run-opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ManagerBot_oc
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.PAID_GOOGLE_API_KEY }}
        with:
          model: google/gemini-2.5-pro
          prompt: ${{ github.event.client_payload.message }}
