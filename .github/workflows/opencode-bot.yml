name: OpenCode Telegram Agent

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Instruction for the agent'
        required: true
      ref:
        description: 'Target branch'
        required: false
        default: 'ManagerBot_oc'

jobs:
  run-opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'ManagerBot_oc' }}
          fetch-depth: 0
          persist-credentials: true

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.PAID_GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: google/gemini-2.5-pro
          share: true
          prompt: ${{ github.event.inputs.message }}
