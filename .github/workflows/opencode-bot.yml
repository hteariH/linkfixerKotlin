name: OpenCode Telegram Agent

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Instruction for the agent'
        required: true

jobs:
  run-opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.PAID_GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: google/gemini-2.5-pro
          prompt: ${{ github.event.inputs.message }}
